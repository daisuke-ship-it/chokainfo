name: Daily Scraper

on:
  schedule:
    - cron: '0 6 * * *'   # 15:00 JST
    - cron: '0 7 * * *'   # 16:00 JST
    - cron: '0 8 * * *'   # 17:00 JST
    - cron: '0 9 * * *'   # 18:00 JST
    - cron: '0 10 * * *'  # 19:00 JST
  workflow_dispatch:
    inputs:
      run_summary:
        description: '魚種・エリア・王冠サマリーを実行するか'
        required: false
        default: 'false'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: スクレイピング実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: python3 src/scraper.py

      - name: 船宿サマリー実行（毎回）
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 src/summarizer.py --mode shipyard

      - name: 魚種・エリア・王冠サマリー実行（18時・19時）
        if: github.event.schedule == '0 9 * * *' || github.event.schedule == '0 10 * * *' || github.event.inputs.run_summary == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 src/summarizer.py --mode summary

      - name: ログをアーティファクトに保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_id }}
          path: backend/logs/
          retention-days: 7
